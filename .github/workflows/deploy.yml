name: Terraform Infra Deploy

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar credenciales de AWS usando secretos de GitHub
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3. Instalar la CLI de Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 4. Inicializar el proyecto (conecta con el backend en S3)
      - name: Terraform Init
        run: terraform init

      # 5. Verificar el formato del código
      - name: Terraform Format
        run: terraform fmt -check

      # 6. Validar la sintaxis de los archivos .tf
      - name: Terraform Validate
        run: terraform validate

      # 7. Generar el plan (se activa en Pull Requests)
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan

      # 8. Aplicar cambios automáticamente (solo cuando se hace push a main)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve